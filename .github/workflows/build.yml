name: CI

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang make unzip libssl-dev libplist-utils

      - name: Check cache
        run: |
          echo "upstream_heads=$(git ls-remote https://github.com/theos/theos | head -n 1 | cut -f 1)-$(git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1)" >> $GITHUB_ENV

      - name: Cache Theos
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Prepare Theos
        if: steps.cache.outputs.cache-hit != 'true'
        uses: Randomblock1/theos-action@main
        with:
          theos-src: https://github.com/theos/theos
          theos-sdks: patched

      - name: Set THEOS path
        run: echo "THEOS=${GITHUB_WORKSPACE}/theos" >> $GITHUB_ENV

      - name: Build package
        run: |
          rm -rf packages
          mkdir -p packages
          make package FINALPACKAGE=1

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}-${{ github.sha }}
          path: packages/*.deb
